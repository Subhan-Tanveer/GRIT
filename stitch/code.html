<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Industrial Workout Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Metropolis:wght@400;700;900&amp;family=Inter:wght@400;700;800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#00e3fd",
                        "primary": "#81ecff",
                        "surface-tint": "#81ecff",
                        "secondary": "#10d5ff",
                        "tertiary-container": "#599cf9",
                        "surface-container-high": "#201f1f",
                        "on-primary-container": "#004d57",
                        "on-background": "#ffffff",
                        "inverse-on-surface": "#565554",
                        "on-primary-fixed-variant": "#005762",
                        "secondary-dim": "#00c6ee",
                        "tertiary-dim": "#5c9ffc",
                        "on-error": "#490006",
                        "error-container": "#9f0519",
                        "secondary-fixed": "#78dfff",
                        "surface-container-lowest": "#000000",
                        "surface-dim": "#0e0e0e",
                        "surface-container-highest": "#262626",
                        "tertiary-fixed-dim": "#65a4ff",
                        "secondary-fixed-dim": "#10d5ff",
                        "on-surface": "#ffffff",
                        "surface-container": "#1a1919",
                        "inverse-primary": "#006976",
                        "error-dim": "#d7383b",
                        "primary-fixed": "#00e3fd",
                        "primary-fixed-dim": "#00d4ec",
                        "on-tertiary-fixed-variant": "#003971",
                        "on-error-container": "#ffa8a3",
                        "surface": "#0e0e0e",
                        "primary-dim": "#00d4ec",
                        "inverse-surface": "#fcf8f8",
                        "outline": "#777575",
                        "outline-variant": "#494847",
                        "surface-bright": "#2c2c2c",
                        "on-secondary-container": "#edfaff",
                        "on-secondary-fixed-variant": "#00586b",
                        "on-tertiary": "#002a55",
                        "surface-container-low": "#131313",
                        "error": "#ff716c",
                        "on-primary": "#005762",
                        "surface-variant": "#262626",
                        "on-tertiary-container": "#001d3f",
                        "on-secondary": "#004554",
                        "on-tertiary-fixed": "#001835",
                        "background": "#0e0e0e",
                        "on-surface-variant": "#adaaaa",
                        "tertiary-fixed": "#80b2ff",
                        "tertiary": "#70aaff",
                        "secondary-container": "#00677d",
                        "on-secondary-fixed": "#003a47",
                        "on-primary-fixed": "#003840"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["Inter"],
                        "condensed": ["Metropolis"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0A0A0A;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .brutalist-border {
            border: 2px solid #222222;
        }
        .accent-border {
            border: 2px solid #E94560;
        }
        .input-focus:focus {
            outline: none;
            border-color: #E94560;
            box-shadow: 0 0 0 1px #E94560;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-[#0A0A0A] text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full border-b-4 border-[#E94560] bg-zinc-950 flex justify-between items-center px-4 h-16 w-full z-50 shadow-[4px_4px_0px_0px_rgba(233,69,96,1)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#E94560]" data-icon="timer">timer</span>
<span class="font-['Inter'] uppercase tracking-tighter text-xl font-black text-[#E94560]">00:24:55</span>
</div>
<div class="font-['Metropolis'] font-black tracking-widest text-lg">PUSH DAY A</div>
<div class="w-8"></div> <!-- Spacer to maintain centering since settings icon was removed -->
</header>
<main class="pt-20 px-4 max-w-4xl mx-auto space-y-6">
<!-- Stats Bar -->
<section class="grid grid-cols-3 brutalist-border bg-zinc-900 divide-x-2 divide-[#222222] font-['Metropolis']">
<div class="p-3 text-center">
<p class="text-xs text-zinc-500 font-bold uppercase tracking-widest">Sets Done</p>
<p class="text-2xl font-black text-white">12/18</p>
</div>
<div class="p-3 text-center">
<p class="text-xs text-zinc-500 font-bold uppercase tracking-widest">Volume</p>
<p class="text-2xl font-black text-white">4,250<span class="text-sm ml-1 text-zinc-400">KG</span></p>
</div>
<div class="p-3 text-center">
<p class="text-xs text-zinc-500 font-bold uppercase tracking-widest">PRs</p>
<p class="text-2xl font-black text-[#E94560]">2</p>
</div>
</section>
<!-- Rest Timer Bar with Mode Toggle -->
<section class="brutalist-border bg-[#111111] overflow-hidden">
<div class="px-4 py-3 flex justify-between items-center">
<div class="flex flex-col">
<span class="font-['Metropolis'] text-xs font-black uppercase tracking-widest text-zinc-500 mb-1">Rest Timer</span>
<span class="font-['Inter'] text-sm text-[#E94560] font-bold">01:12 / 02:00</span>
</div>
<!-- Segmented Control Style Toggle -->
<div class="flex p-0.5 bg-zinc-900 brutalist-border border-zinc-800">
<button class="px-4 py-1 text-[10px] font-black font-['Metropolis'] uppercase tracking-widest bg-[#E94560] text-black transition-colors">
                        Auto
                    </button>
<button class="px-4 py-1 text-[10px] font-black font-['Metropolis'] uppercase tracking-widest text-zinc-500 hover:text-zinc-300 transition-colors">
                        Manual
                    </button>
</div>
</div>
<div class="w-full bg-zinc-800 h-1">
<div class="bg-[#E94560] h-full" style="width: 60%"></div>
</div>
</section>
<!-- Exercise Card: Bench Press -->
<section class="brutalist-border bg-zinc-950 overflow-hidden">
<header class="bg-[#111111] p-4 flex justify-between items-center border-b-2 border-[#222222]">
<h2 class="font-['Metropolis'] font-black text-2xl uppercase tracking-tight">Bench Press (Barbell)</h2>
<span class="material-symbols-outlined text-zinc-600 cursor-pointer" data-icon="more_vert">more_vert</span>
</header>
<div class="p-0">
<!-- Grid Headers -->
<div class="grid grid-cols-5 bg-zinc-900 py-2 px-4 border-b border-[#222222] text-[10px] font-black uppercase text-zinc-500 tracking-tighter font-['Metropolis']">
<div class="text-center">Set</div>
<div class="text-center">Weight (KG)</div>
<div class="text-center"></div>
<div class="text-center">Reps</div>
<div class="text-center">Done</div>
</div>
<!-- Set Rows -->
<div class="divide-y divide-[#222222]">
<!-- Completed Set -->
<div class="grid grid-cols-5 items-center px-4 py-3 bg-zinc-900/50">
<div class="text-center font-['Inter'] text-sm text-zinc-400">1</div>
<div class="flex justify-center">
<input class="w-16 h-8 bg-[#0A0A0A] brutalist-border text-center font-['Inter'] text-sm input-focus" type="number" value="100"/>
</div>
<div class="text-center text-zinc-600 font-['Inter'] text-xs">×</div>
<div class="flex justify-center">
<input class="w-16 h-8 bg-[#0A0A0A] brutalist-border text-center font-['Inter'] text-sm input-focus" type="number" value="5"/>
</div>
<div class="flex justify-center relative">
<div class="w-8 h-8 bg-[#E94560] flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-black font-black" data-icon="check">check</span>
</div>
</div>
</div>
<!-- PR Set -->
<div class="grid grid-cols-5 items-center px-4 py-3 bg-zinc-950">
<div class="text-center font-['Inter'] text-sm text-zinc-400">2</div>
<div class="flex justify-center">
<input class="w-16 h-8 bg-[#0A0A0A] brutalist-border text-center font-['Inter'] text-sm input-focus border-[#E94560]" type="number" value="105"/>
</div>
<div class="text-center text-zinc-600 font-['Inter'] text-xs">×</div>
<div class="flex justify-center">
<input class="w-16 h-8 bg-[#0A0A0A] brutalist-border text-center font-['Inter'] text-sm input-focus" type="number" value="5"/>
</div>
<div class="flex justify-center relative">
<div class="absolute -top-2 -right-1 bg-[#E94560] text-black text-[8px] font-black px-1 leading-tight uppercase font-['Metropolis']">PR</div>
<div class="w-8 h-8 brutalist-border bg-[#111111] flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-zinc-800" data-icon="check">check</span>
</div>
</div>
</div>
<!-- Next Set -->
<div class="grid grid-cols-5 items-center px-4 py-3 bg-zinc-950">
<div class="text-center font-['Inter'] text-sm text-zinc-400">3</div>
<div class="flex justify-center">
<input class="w-16 h-8 bg-[#0A0A0A] brutalist-border text-center font-['Inter'] text-sm input-focus" placeholder="---" type="number"/>
</div>
<div class="text-center text-zinc-600 font-['Inter'] text-xs">×</div>
<div class="flex justify-center">
<input class="w-16 h-8 bg-[#0A0A0A] brutalist-border text-center font-['Inter'] text-sm input-focus" placeholder="---" type="number"/>
</div>
<div class="flex justify-center">
<div class="w-8 h-8 brutalist-border bg-[#111111] flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-zinc-800" data-icon="check">check</span>
</div>
</div>
</div>
</div>
<button class="w-full py-3 font-['Metropolis'] font-bold text-xs uppercase tracking-[0.2em] text-zinc-400 hover:text-white border-t border-[#222222] transition-colors active:bg-zinc-900">
                    + Add Set
                </button>
</div>
</section>
<!-- Exercise Card: Overhead Press -->
<section class="brutalist-border bg-zinc-950 overflow-hidden opacity-60">
<header class="bg-[#111111] p-4 flex justify-between items-center border-b-2 border-[#222222]">
<h2 class="font-['Metropolis'] font-black text-2xl uppercase tracking-tight">Overhead Press</h2>
<span class="material-symbols-outlined text-zinc-600" data-icon="more_vert">more_vert</span>
</header>
<div class="p-8 text-center font-['Metropolis'] text-zinc-600 font-bold uppercase">
                Up Next
            </div>
</section>
<!-- Global Actions -->
<div class="space-y-4 pb-12">
<div class="grid grid-cols-2 gap-4">
<button class="brutalist-border py-4 font-['Metropolis'] font-black uppercase tracking-widest text-white hover:bg-zinc-800 active:translate-y-1 transition-all">
                    Add Exercise
                </button>
<button class="accent-border py-4 font-['Metropolis'] font-black uppercase tracking-widest text-[#E94560] hover:bg-[#E94560] hover:text-black active:translate-y-1 transition-all">
                    Finish Workout
                </button>
</div>
<button class="w-full brutalist-border border-zinc-700 bg-zinc-900/50 py-4 font-['Metropolis'] font-black uppercase tracking-widest text-zinc-500 hover:text-zinc-300 hover:border-zinc-500 active:translate-y-1 transition-all">
                Discard Workout
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full h-20 z-50 flex justify-around items-stretch bg-zinc-950 border-t-4 border-[#E94560]">
<a class="flex flex-col items-center justify-center bg-[#E94560] text-black p-2 h-full flex-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="fitness_center">fitness_center</span>
<span class="font-['Metropolis'] font-black tracking-widest text-xs mt-1">WORKOUT</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 p-2 flex-1 hover:bg-zinc-800 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="history">history</span>
<span class="font-['Metropolis'] font-black tracking-widest text-xs mt-1">HISTORY</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 p-2 flex-1 hover:bg-zinc-800 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="leaderboard">leaderboard</span>
<span class="font-['Metropolis'] font-black tracking-widest text-xs mt-1">STATS</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 p-2 flex-1 hover:bg-zinc-800 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="person">person</span>
<span class="font-['Metropolis'] font-black tracking-widest text-xs mt-1">PROFILE</span>
</a>
</nav>
</body></html>
